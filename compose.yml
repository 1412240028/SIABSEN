services:

  app:

    build:
      context: .
      dockerfile: docker/php/Dockerfile

    container_name: siabsen-app

    working_dir: /var/www/html

    volumes:
      - .:/var/www/html

    depends_on:
      - mysql
      - redis

  nginx:

    image: nginx:latest

    container_name: siabsen-nginx

    ports:
      - "8000:80"

    volumes:
      - .:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf

    depends_on:
      - app

  mysql:

    image: mysql:8.4

    container_name: siabsen-mysql

    environment:

      MYSQL_DATABASE: siabsen

      MYSQL_ROOT_PASSWORD: root

      MYSQL_USER: laravel

      MYSQL_PASSWORD: secret

    ports:
      - "3306:3306"

    volumes:
      - mysql_data:/var/lib/mysql

  redis:

    image: redis:latest

    container_name: siabsen-redis

    ports:
      - "6379:6379"

  mailpit:

    image: axllent/mailpit

    container_name: siabsen-mailpit

    ports:
      - "8025:8025"
      - "1025:1025"

volumes:

  mysql_data: